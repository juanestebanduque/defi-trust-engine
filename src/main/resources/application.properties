# ====================
# Base de Datos (H2 en memoria)
# ====================
spring.datasource.url=jdbc:h2:mem:trustdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# Usar "validate" cuando la BD ya existe (database.build la creó)
# Usar "update" durante desarrollo si quieres que Hibernate ajuste tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console — disponible en http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ====================
# JWT
# ====================
jwt.secret=TrustEngineSecretKey2024DeFiP2P!!
jwt.expiration-ms=86400000
