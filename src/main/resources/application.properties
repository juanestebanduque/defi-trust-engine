# ====================
# Base de Datos (PostgreSQL)
# ====================
spring.datasource.url=jdbc:postgresql://localhost:5432/trustdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# Usar "validate" cuando la BD ya existe (database.build la creó)
# Usar "update" durante desarrollo si quieres que Hibernate ajuste tablas automáticamente
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ====================
# JWT
# ====================
# Clave secreta: mínimo 32 caracteres (256 bits) para HMAC-SHA256
jwt.secret=TrustEngineSecretKey2024DeFiP2P!!
jwt.expiration-ms=86400000
